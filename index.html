<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="row">
        <div class="col-5">
          <form class="d-flex p-3" id="formularioAgregarPersonaje">
            <input
              class="form-control me-2"
              type="text"
              placeholder="Ingrese el nombre del personaje"
              aria-label="Search"
              id="nombre"
            />
            <input
              class="form-control me-2"
              type="text"
              placeholder="Ingrese la URL del personaje"
              aria-label="Search"
              id="imagen"
            />
            <button
              class="btn btn-outline-warning"
              type="submit"
              id="crearPersonaje"
            >
              Crear Personaje
            </button>
          </form>
        </div>
        <div class="col-5 m-auto">
          <form class="d-flex p-3" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="búsqueda de personajes"
              aria-label="Search"
              id="buscador"
            />
            <button
              class="btn btn-outline-warning"
              type="submit"
              id="botonBusqueda"
            >
              buscar
            </button>
          </form>
        </div>
        <div class="col-12">
          <div class="text-center" id="advertencia"></div>
        </div>
      </div>
    </header>
    <main>
      <h1 class="text-center p-4">Galería de Superhéreos</h1>
      <div class="row mt-2" id="rowContainer"></div>
    </main>
    <script src="assets/js/app.js"></script>
  </body>
</html>
